name: CI

on:
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR commits
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: $msg"
              echo "  Expected format: type(scope): description"
              echo "  Types: feat fix docs style refactor perf test build ci chore revert"
              FAILED=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must follow Conventional Commits: https://www.conventionalcommits.org"
            exit 1
          fi
          echo "All commits follow conventional commit format."

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: collaborative-layout-designer-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: collaborative-layout-designer-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: collaborative-layout-designer-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: collaborative-layout-designer-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libcups2-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/collaborative-layout-designer
          cp build/src/app/collaborative-layout-designer dist/collaborative-layout-designer/
          # Bundle the parts library so the tarball is self-contained.
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          # Bundle compiled translations, if any.
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          APP=dist/CollaborativeLayoutDesigner.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp build/src/app/collaborative-layout-designer "$APP/Contents/MacOS/collaborative-layout-designer"
          # Bundle the parts library inside Resources so the app works
          # self-contained when dragged out of the zip.
          cp -r parts/BlueBrickParts "$APP/Contents/Resources/BlueBrickParts"
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p "$APP/Contents/MacOS/translations"
            cp build/*.qm "$APP/Contents/MacOS/translations/"
          fi
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>collaborative-layout-designer</string>
            <key>CFBundleName</key><string>Collaborative Layout Designer</string>
            <key>CFBundleIdentifier</key><string>com.collaborative-layout-designer.app</string>
            <key>CFBundleVersion</key><string>0.1</string>
            <key>CFBundleShortVersionString</key><string>0.1</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip CollaborativeLayoutDesigner.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/collaborative-layout-designer
          cp build/src/app/Release/collaborative-layout-designer.exe dist/collaborative-layout-designer/ 2>/dev/null || \
          cp build/src/app/collaborative-layout-designer.exe dist/collaborative-layout-designer/
          # Bundle Qt runtime + plugins next to the exe.
          windeployqt dist/collaborative-layout-designer/collaborative-layout-designer.exe
          # Bundle parts library so the zip is self-contained.
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/LICENSE.txt 2>/dev/null || true
          cd dist && 7z a ../${{ matrix.artifact }}.zip collaborative-layout-designer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
