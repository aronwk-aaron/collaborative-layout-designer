name: Nightly

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: collaborative-layout-designer-nightly-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: collaborative-layout-designer-nightly-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: collaborative-layout-designer-nightly-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: collaborative-layout-designer-nightly-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libcups2-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/collaborative-layout-designer
          cp build/src/app/collaborative-layout-designer dist/collaborative-layout-designer/
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          APP=dist/CollaborativeLayoutDesigner.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp build/src/app/collaborative-layout-designer "$APP/Contents/MacOS/collaborative-layout-designer"
          cp -r parts/BlueBrickParts "$APP/Contents/Resources/BlueBrickParts"
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p "$APP/Contents/MacOS/translations"
            cp build/*.qm "$APP/Contents/MacOS/translations/"
          fi
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>collaborative-layout-designer</string>
            <key>CFBundleName</key><string>Collaborative Layout Designer</string>
            <key>CFBundleIdentifier</key><string>com.collaborative-layout-designer.app</string>
            <key>CFBundleVersion</key><string>nightly</string>
            <key>CFBundleShortVersionString</key><string>nightly</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip CollaborativeLayoutDesigner.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/collaborative-layout-designer
          cp build/src/app/Release/collaborative-layout-designer.exe dist/collaborative-layout-designer/ 2>/dev/null || \
          cp build/src/app/collaborative-layout-designer.exe dist/collaborative-layout-designer/
          windeployqt dist/collaborative-layout-designer/collaborative-layout-designer.exe
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/LICENSE.txt 2>/dev/null || true
          cd dist && 7z a ../${{ matrix.artifact }}.zip collaborative-layout-designer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            **Nightly pre-release** built automatically from the latest commit on `main`.

            These are unsigned, AI-assisted builds — **use tagged releases for stability**
            and keep backups of any `.bbm` you care about. See the README for the
            full AI-assisted / vibe-coded warning.
          files: artifacts/*
          prerelease: true
          make_latest: false
