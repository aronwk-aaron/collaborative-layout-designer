name: Nightly

on:
  push:
    branches: [main]

# actions/checkout@v4 et al currently target Node 20, which GitHub
# starts forcing off in June 2026. Opt into Node 24 now so the
# deprecation warnings stop cluttering the logs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: collaborative-layout-designer-nightly-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: collaborative-layout-designer-nightly-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: collaborative-layout-designer-nightly-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: collaborative-layout-designer-nightly-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libcups2-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (Linux .tar.gz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/collaborative-layout-designer
          cp build/src/app/collaborative-layout-designer dist/collaborative-layout-designer/
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          # AppDir hierarchy per AppImage convention:
          #   AppDir/usr/bin/<binary>
          #   AppDir/usr/share/applications/<desktop>
          #   AppDir/usr/share/icons/hicolor/256x256/apps/<icon>.png
          APPDIR=build/AppDir
          rm -rf "${APPDIR}"
          mkdir -p "${APPDIR}/usr/bin" \
                    "${APPDIR}/usr/share/applications" \
                    "${APPDIR}/usr/share/icons/hicolor/256x256/apps" \
                    "${APPDIR}/usr/share/collaborative-layout-designer/parts" \
                    "${APPDIR}/usr/share/collaborative-layout-designer/translations"
          cp build/src/app/collaborative-layout-designer "${APPDIR}/usr/bin/"
          cp packaging/linux/collaborative-layout-designer.desktop "${APPDIR}/usr/share/applications/"
          cp packaging/icons/collaborative-layout-designer.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/"
          cp -r parts/BlueBrickParts "${APPDIR}/usr/share/collaborative-layout-designer/parts/" || true
          if ls build/*.qm 1>/dev/null 2>&1; then
            cp build/*.qm "${APPDIR}/usr/share/collaborative-layout-designer/translations/"
          fi
          # linuxdeploy + the Qt plugin bundle dependent shared libs
          # and wire up the AppRun. Pinned to a known-good continuous
          # release; they publish binary x86_64 AppImages of the tools
          # themselves.
          curl -L -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
          # GitHub Actions runners don't have FUSE by default, so use
          # --appimage-extract-and-run on the AppImage tools themselves.
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy --appdir "${APPDIR}" \
                        --plugin qt \
                        --output appimage
          mv *.AppImage ${{ matrix.artifact }}.AppImage

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # CMake built a proper .app bundle (MACOSX_BUNDLE ON in
          # src/app/CMakeLists.txt). Move it into dist/, drop parts +
          # translations in, then let macdeployqt embed the Qt frameworks.
          mkdir -p dist
          SRC_APP=build/src/app/collaborative-layout-designer.app
          APP=dist/CollaborativeLayoutDesigner.app
          cp -R "$SRC_APP" "$APP"
          mkdir -p "$APP/Contents/Resources"
          cp -r parts/BlueBrickParts "$APP/Contents/Resources/BlueBrickParts"
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p "$APP/Contents/Resources/translations"
            cp build/*.qm "$APP/Contents/Resources/translations/"
          fi
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip CollaborativeLayoutDesigner.app
          cd ..
          # Also emit an unsigned .dmg — macdeployqt gets this close
          # but hdiutil gives us a drag-to-Applications disk image
          # that most end users expect. Without codesigning / notary
          # the user still has to right-click → Open on first launch
          # to bypass Gatekeeper. That warning is the price of not
          # owning an Apple Developer ID; the DMG itself is fine.
          hdiutil create -volname "Collaborative Layout Designer" \
            -srcfolder dist/CollaborativeLayoutDesigner.app \
            -ov -format UDZO ${{ matrix.artifact }}.dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Visual Studio (multi-config) places the .exe in
          # build/<CONFIG>/ because our app has OUTPUT_NAME set; Ninja
          # would put it at build/src/app/. Locate it either way.
          mkdir -p dist/collaborative-layout-designer
          EXE=$(find build -name collaborative-layout-designer.exe -not -path '*/CMakeFiles/*' | head -n 1)
          if [ -z "$EXE" ]; then
            echo "Could not locate collaborative-layout-designer.exe in build/"
            find build -name '*.exe' -not -path '*/CMakeFiles/*' | head
            exit 1
          fi
          cp "$EXE" dist/collaborative-layout-designer/
          windeployqt dist/collaborative-layout-designer/collaborative-layout-designer.exe
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/LICENSE.txt 2>/dev/null || true
          cd dist && 7z a ../${{ matrix.artifact }}.zip collaborative-layout-designer
          cd ..

      - name: Package (Windows MSI)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dotnet tool install --global wix --version 4.* || true
          export PATH="$HOME/.dotnet/tools:$PATH"
          # The MSI ships just the binary + Qt runtime (+ translations).
          # The parts library is thousands of tiny files with lots of
          # repeat basenames (_partlist.txt under every category, etc)
          # that collide in WiX v4's auto-GUID namespace. It's also
          # 10+ MB of mostly static data that doesn't belong inside a
          # versioned installer — users point Preferences at any
          # BlueBrickParts checkout, or use the .zip distribution which
          # keeps the library bundled.
          mkdir -p packaging/windows/staging
          # cp -r then delete the parts/ subtree — rsync isn't on
          # the Windows runner image, so we fake --exclude by hand.
          cp -r dist/collaborative-layout-designer/. packaging/windows/staging/
          rm -rf packaging/windows/staging/parts
          cd packaging/windows
          wix extension add WixToolset.UI.wixext WixToolset.Util.wixext || true
          # heat.exe isn't shipped with wix4 CLI; synthesise the
          # Harvested component group manually for every staged file
          # other than the main exe (which the .wxs declares directly).
          {
            echo '<?xml version="1.0" encoding="utf-8"?>'
            echo '<Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">'
            echo '  <Fragment>'
            echo '    <ComponentGroup Id="HarvestedComponents" Directory="INSTALLFOLDER">'
            find staging -type f -not -name collaborative-layout-designer.exe | while read f; do
              rel="${f#staging/}"
              uid="Harv$(echo "$rel" | tr -c '[:alnum:]' '_' )"
              # WiX4 auto-generates File IDs by hashing properties,
              # and windeployqt can copy identical-path Qt plugins
              # under different Component parents which makes the
              # hash collide. Give every File an explicit Id matching
              # its Component so collisions are impossible.
              echo "      <Component Id=\"$uid\" Guid=\"*\">"
              echo "        <File Id=\"${uid}_F\" Source=\"staging\\\\$rel\" KeyPath=\"yes\" />"
              echo "      </Component>"
            done
            echo '    </ComponentGroup>'
            echo '  </Fragment>'
            echo '</Wix>'
          } > Harvested.wxs
          wix build collaborative-layout-designer.wxs Harvested.wxs \
              -arch x64 \
              -out ../../${{ matrix.artifact }}.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            **Nightly pre-release** built automatically from the latest commit on `main`.

            These are unsigned, AI-assisted builds — **use tagged releases for stability**
            and keep backups of any `.bbm` you care about. See the README for the
            full AI-assisted / vibe-coded warning.
          files: artifacts/*
          prerelease: true
          make_latest: false
