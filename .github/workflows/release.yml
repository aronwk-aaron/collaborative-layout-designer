name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: brick-layout-designer-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: brick-layout-designer-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: brick-layout-designer-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: brick-layout-designer-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libcups2-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (Linux .tar.gz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/brick-layout-designer
          cp build/src/app/brick-layout-designer dist/brick-layout-designer/
          cp -r parts/BlueBrickParts dist/brick-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/brick-layout-designer/translations
            cp build/*.qm dist/brick-layout-designer/translations/
          fi
          cp README.md dist/brick-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/brick-layout-designer/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Linux AppImage)
        if: runner.os == 'Linux'
        run: |
          APPDIR=build/AppDir
          rm -rf "${APPDIR}"
          mkdir -p "${APPDIR}/usr/bin" \
                    "${APPDIR}/usr/share/applications" \
                    "${APPDIR}/usr/share/icons/hicolor/256x256/apps" \
                    "${APPDIR}/usr/share/brick-layout-designer/parts" \
                    "${APPDIR}/usr/share/brick-layout-designer/translations"
          cp build/src/app/brick-layout-designer "${APPDIR}/usr/bin/"
          cp packaging/linux/brick-layout-designer.desktop "${APPDIR}/usr/share/applications/"
          cp packaging/icons/brick-layout-designer.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/"
          cp -r parts/BlueBrickParts "${APPDIR}/usr/share/brick-layout-designer/parts/" || true
          if ls build/*.qm 1>/dev/null 2>&1; then
            cp build/*.qm "${APPDIR}/usr/share/brick-layout-designer/translations/"
          fi
          curl -L -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy --appdir "${APPDIR}" --plugin qt --output appimage
          mv *.AppImage ${{ matrix.artifact }}.AppImage

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use the .app bundle CMake already built (MACOSX_BUNDLE ON).
          # Patch the Info.plist with the release tag version, then drop
          # parts + translations into Resources and let macdeployqt embed
          # Qt frameworks.
          mkdir -p dist
          SRC_APP=build/src/app/brick-layout-designer.app
          APP=dist/CollaborativeLayoutDesigner.app
          cp -R "$SRC_APP" "$APP"
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" \
            "$APP/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" \
            "$APP/Contents/Info.plist" || true
          mkdir -p "$APP/Contents/Resources"
          cp -r parts/BlueBrickParts "$APP/Contents/Resources/BlueBrickParts"
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p "$APP/Contents/Resources/translations"
            cp build/*.qm "$APP/Contents/Resources/translations/"
          fi
          macdeployqt "$APP" -verbose=1

      - name: Codesign (macOS)
        # Runs when the Apple Developer secrets are configured in the
        # repo. Drop them in to turn on Gatekeeper + notarization; the
        # step is a no-op otherwise and the build falls back to an
        # unsigned .zip / .dmg that end users open with right-click →
        # Open on first launch.
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE:          ${{ secrets.MACOS_CERTIFICATE }}           # base64-encoded .p12
          MACOS_CERTIFICATE_PWD:      ${{ secrets.MACOS_CERTIFICATE_PWD }}       # passphrase for the .p12
          MACOS_CERTIFICATE_NAME:     ${{ secrets.MACOS_CERTIFICATE_NAME }}      # "Developer ID Application: Your Name (TEAMID)"
          MACOS_KEYCHAIN_PWD:         ${{ secrets.MACOS_KEYCHAIN_PWD }}          # any short random string
        run: |
          # Import the signing cert into a fresh, per-job keychain so
          # nothing leaks across runs and the keychain disappears with
          # the runner at job-end.
          KEYCHAIN=build.keychain
          security create-keychain -p "${MACOS_KEYCHAIN_PWD}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${MACOS_KEYCHAIN_PWD}" "${KEYCHAIN}"
          echo "${MACOS_CERTIFICATE}" | base64 --decode > cert.p12
          security import cert.p12 -k "${KEYCHAIN}" \
            -P "${MACOS_CERTIFICATE_PWD}" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "${MACOS_KEYCHAIN_PWD}" "${KEYCHAIN}"
          security list-keychains -d user -s "${KEYCHAIN}" login.keychain

          # Deep-sign the bundle with the hardened runtime so notary
          # accepts it. --force because macdeployqt already signed
          # individual frameworks; we overwrite with our identity.
          codesign --force --deep --options runtime --timestamp \
            --sign "${MACOS_CERTIFICATE_NAME}" dist/CollaborativeLayoutDesigner.app
          rm -f cert.p12

      - name: Notarize (macOS)
        # Separate step so a signing failure surfaces distinctly from
        # a notary upload failure — and so notarization only runs
        # when both the cert AND the Apple ID creds are configured.
        if: runner.os == 'macOS' && env.APPLE_ID != ''
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}            # email of the Apple Developer account
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}  # app-specific password, NOT the login
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}       # 10-char team ID from the developer portal
        run: |
          # notarytool wants a ZIP. Submit + wait + staple the
          # ticket back onto the .app so offline launches work.
          ditto -c -k --keepParent dist/CollaborativeLayoutDesigner.app notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_APP_PASSWORD}" \
            --team-id  "${APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple dist/CollaborativeLayoutDesigner.app
          rm -f notarize.zip

      - name: Package (macOS .zip + .dmg)
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../${{ matrix.artifact }}.zip CollaborativeLayoutDesigner.app
          cd ..
          hdiutil create -volname "Collaborative Layout Designer" \
            -srcfolder dist/CollaborativeLayoutDesigner.app \
            -ov -format UDZO ${{ matrix.artifact }}.dmg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Visual Studio (multi-config) places the .exe in
          # build/<CONFIG>/ because the app has OUTPUT_NAME set; Ninja
          # would put it at build/src/app/. Locate it either way.
          mkdir -p dist/brick-layout-designer
          EXE=$(find build -name brick-layout-designer.exe -not -path '*/CMakeFiles/*' | head -n 1)
          if [ -z "$EXE" ]; then
            echo "Could not locate brick-layout-designer.exe in build/"
            find build -name '*.exe' -not -path '*/CMakeFiles/*' | head
            exit 1
          fi
          cp "$EXE" dist/brick-layout-designer/
          windeployqt dist/brick-layout-designer/brick-layout-designer.exe
          cp -r parts/BlueBrickParts dist/brick-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/brick-layout-designer/translations
            cp build/*.qm dist/brick-layout-designer/translations/
          fi
          cp README.md dist/brick-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/brick-layout-designer/LICENSE.txt 2>/dev/null || true
          cd dist && 7z a ../${{ matrix.artifact }}.zip brick-layout-designer
          cd ..

      - name: Codesign exe (Windows)
        # Signs the .exe BEFORE it gets bundled into the MSI so the
        # MSI's embedded binary is trusted. When secrets aren't set
        # this step is a no-op and we ship an unsigned exe + MSI
        # (users see "unknown publisher" in SmartScreen on first run).
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}  # base64-encoded .pfx code-signing cert
          WINDOWS_PFX_PWD:    ${{ secrets.WINDOWS_PFX_PWD }}     # passphrase for the .pfx
        run: |
          # Decode the pfx to a temp file, sign every PE binary in
          # the staged dist tree, then delete the pfx. signtool.exe
          # is in the Windows SDK; on the windows-latest image it's
          # already on PATH.
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $SDKSign = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $SDKSign) { $SDKSign = "signtool.exe" }
          Get-ChildItem -Path dist -Recurse -Include *.exe,*.dll | ForEach-Object {
            & $SDKSign sign /f cert.pfx /p $env:WINDOWS_PFX_PWD `
              /fd SHA256 /tr http://timestamp.sectigo.com /td SHA256 `
              $_.FullName
          }
          Remove-Item cert.pfx

      - name: Package (Windows MSI)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dotnet tool install --global wix --version 4.* || true
          export PATH="$HOME/.dotnet/tools:$PATH"
          # MSI excludes parts/ — see matching nightly.yml comment.
          mkdir -p packaging/windows/staging
          # cp -r + rm -rf parts/ — rsync isn't available on the
          # Windows runner image.
          cp -r dist/brick-layout-designer/. packaging/windows/staging/
          rm -rf packaging/windows/staging/parts
          cd packaging/windows
          wix extension add WixToolset.UI.wixext WixToolset.Util.wixext || true
          # Mirror the staging directory tree into the WiX manifest so
          # Qt finds platforms/qwindows.dll, styles/, imageformats/,
          # etc. at their expected subpaths. A flat layout breaks Qt
          # at runtime with "no Qt platform plugin could be initialized".
          python ../../scripts/harvest-wix.py \
            --staging staging \
            --out Harvested.wxs \
            --exclude-top brick-layout-designer.exe
          wix build brick-layout-designer.wxs Harvested.wxs \
              -arch x64 \
              -out ../../${{ matrix.artifact }}.msi

      - name: Codesign MSI (Windows)
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PWD:    ${{ secrets.WINDOWS_PFX_PWD }}
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $SDKSign = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $SDKSign) { $SDKSign = "signtool.exe" }
          & $SDKSign sign /f cert.pfx /p $env:WINDOWS_PFX_PWD `
            /fd SHA256 /tr http://timestamp.sectigo.com /td SHA256 `
            "${{ matrix.artifact }}.msi"
          Remove-Item cert.pfx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          TAG_MSG=$(git tag -l --format='%(contents)' "$CURRENT_TAG" | head -20)

          {
            echo 'BODY<<ENDOFNOTES'
            echo "> ⚠️ **AI-assisted / "vibe-coded" build.** See README for the full"
            echo "> warning. Keep backups of any \`.bbm\` you care about."
            echo ""

            if [ -n "$TAG_MSG" ] && [ "$TAG_MSG" != "$CURRENT_TAG" ]; then
              echo "$TAG_MSG"
              echo ""
            fi

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              RANGE="${PREV_TAG}..${CURRENT_TAG}"
            else
              RANGE="HEAD~20..HEAD"
            fi

            COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges)

            BREAKING=$(echo "$COMMITS"   | grep -E '^[a-z]+(\(.+\))?!: '  | sed 's/^/- /' || true)
            FEAT=$(echo "$COMMITS"       | grep -E '^feat(\(.+\))?: '    | sed 's/^/- /' || true)
            FIX=$(echo "$COMMITS"        | grep -E '^fix(\(.+\))?: '     | sed 's/^/- /' || true)
            PERF=$(echo "$COMMITS"       | grep -E '^perf(\(.+\))?: '    | sed 's/^/- /' || true)
            DOCS=$(echo "$COMMITS"       | grep -E '^docs(\(.+\))?: '    | sed 's/^/- /' || true)
            CI_BUILD=$(echo "$COMMITS"   | grep -E '^(ci|build)(\(.+\))?: ' | sed 's/^/- /' || true)
            OTHER=$(echo "$COMMITS"      | grep -vE '^(feat|fix|perf|docs|ci|build|style|refactor|test|chore|revert)(\(.+\))?!?: ' | sed 's/^/- /' || true)

            if [ -n "$BREAKING" ]; then echo "### ⚠ Breaking Changes";   echo "$BREAKING"; echo ""; fi
            if [ -n "$FEAT" ];     then echo "### Features";              echo "$FEAT";     echo ""; fi
            if [ -n "$FIX" ];      then echo "### Bug Fixes";             echo "$FIX";      echo ""; fi
            if [ -n "$PERF" ];     then echo "### Performance";           echo "$PERF";     echo ""; fi
            if [ -n "$DOCS" ];     then echo "### Documentation";         echo "$DOCS";     echo ""; fi
            if [ -n "$CI_BUILD" ]; then echo "### Build & CI";            echo "$CI_BUILD"; echo ""; fi
            if [ -n "$OTHER" ];    then echo "### Other Changes";         echo "$OTHER";    echo ""; fi

            echo 'ENDOFNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.notes.outputs.BODY }}
