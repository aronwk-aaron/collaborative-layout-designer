name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: collaborative-layout-designer-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: collaborative-layout-designer-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: collaborative-layout-designer-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: collaborative-layout-designer-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libcups2-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/collaborative-layout-designer
          cp build/src/app/collaborative-layout-designer dist/collaborative-layout-designer/
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use the .app bundle CMake already built (MACOSX_BUNDLE ON).
          # Patch the Info.plist with the release tag version, then drop
          # parts + translations into Resources and let macdeployqt embed
          # Qt frameworks.
          mkdir -p dist
          SRC_APP=build/src/app/collaborative-layout-designer.app
          APP=dist/CollaborativeLayoutDesigner.app
          cp -R "$SRC_APP" "$APP"
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" \
            "$APP/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" \
            "$APP/Contents/Info.plist" || true
          mkdir -p "$APP/Contents/Resources"
          cp -r parts/BlueBrickParts "$APP/Contents/Resources/BlueBrickParts"
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p "$APP/Contents/Resources/translations"
            cp build/*.qm "$APP/Contents/Resources/translations/"
          fi
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip CollaborativeLayoutDesigner.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Visual Studio (multi-config) places the .exe in
          # build/<CONFIG>/ because the app has OUTPUT_NAME set; Ninja
          # would put it at build/src/app/. Locate it either way.
          mkdir -p dist/collaborative-layout-designer
          EXE=$(find build -name collaborative-layout-designer.exe -not -path '*/CMakeFiles/*' | head -n 1)
          if [ -z "$EXE" ]; then
            echo "Could not locate collaborative-layout-designer.exe in build/"
            find build -name '*.exe' -not -path '*/CMakeFiles/*' | head
            exit 1
          fi
          cp "$EXE" dist/collaborative-layout-designer/
          windeployqt dist/collaborative-layout-designer/collaborative-layout-designer.exe
          cp -r parts/BlueBrickParts dist/collaborative-layout-designer/parts
          if ls build/*.qm 1>/dev/null 2>&1; then
            mkdir -p dist/collaborative-layout-designer/translations
            cp build/*.qm dist/collaborative-layout-designer/translations/
          fi
          cp README.md dist/collaborative-layout-designer/ 2>/dev/null || true
          cp LICENSE  dist/collaborative-layout-designer/LICENSE.txt 2>/dev/null || true
          cd dist && 7z a ../${{ matrix.artifact }}.zip collaborative-layout-designer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          TAG_MSG=$(git tag -l --format='%(contents)' "$CURRENT_TAG" | head -20)

          {
            echo 'BODY<<ENDOFNOTES'
            echo "> ⚠️ **AI-assisted / "vibe-coded" build.** See README for the full"
            echo "> warning. Keep backups of any \`.bbm\` you care about."
            echo ""

            if [ -n "$TAG_MSG" ] && [ "$TAG_MSG" != "$CURRENT_TAG" ]; then
              echo "$TAG_MSG"
              echo ""
            fi

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              RANGE="${PREV_TAG}..${CURRENT_TAG}"
            else
              RANGE="HEAD~20..HEAD"
            fi

            COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges)

            BREAKING=$(echo "$COMMITS"   | grep -E '^[a-z]+(\(.+\))?!: '  | sed 's/^/- /' || true)
            FEAT=$(echo "$COMMITS"       | grep -E '^feat(\(.+\))?: '    | sed 's/^/- /' || true)
            FIX=$(echo "$COMMITS"        | grep -E '^fix(\(.+\))?: '     | sed 's/^/- /' || true)
            PERF=$(echo "$COMMITS"       | grep -E '^perf(\(.+\))?: '    | sed 's/^/- /' || true)
            DOCS=$(echo "$COMMITS"       | grep -E '^docs(\(.+\))?: '    | sed 's/^/- /' || true)
            CI_BUILD=$(echo "$COMMITS"   | grep -E '^(ci|build)(\(.+\))?: ' | sed 's/^/- /' || true)
            OTHER=$(echo "$COMMITS"      | grep -vE '^(feat|fix|perf|docs|ci|build|style|refactor|test|chore|revert)(\(.+\))?!?: ' | sed 's/^/- /' || true)

            if [ -n "$BREAKING" ]; then echo "### ⚠ Breaking Changes";   echo "$BREAKING"; echo ""; fi
            if [ -n "$FEAT" ];     then echo "### Features";              echo "$FEAT";     echo ""; fi
            if [ -n "$FIX" ];      then echo "### Bug Fixes";             echo "$FIX";      echo ""; fi
            if [ -n "$PERF" ];     then echo "### Performance";           echo "$PERF";     echo ""; fi
            if [ -n "$DOCS" ];     then echo "### Documentation";         echo "$DOCS";     echo ""; fi
            if [ -n "$CI_BUILD" ]; then echo "### Build & CI";            echo "$CI_BUILD"; echo ""; fi
            if [ -n "$OTHER" ];    then echo "### Other Changes";         echo "$OTHER";    echo ""; fi

            echo 'ENDOFNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.notes.outputs.BODY }}
